- name: HipChat Webhooks API
  description: Event-driven webhook delivery from HipChat rooms. Webhooks could be registered via the REST API
    or declared in an add-on descriptor. Each delivery included a JWT-signed signed_request query parameter
    that the receiving service was expected to verify. The room_message event was the primary integration
    pattern, with additional events covering room enter, exit, topic change, archive, notification, and file
    upload. The webhook surface was retired with the rest of HipChat on February 15, 2019.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseUrl: https://api.hipchat.com/v2/room/{id_or_name}/webhook
  humanURL: https://developer.atlassian.com/server/hipchat/webhooks/
