name: HipChat
description: HipChat was Atlassian's team chat platform, providing persistent group chat, video, file sharing,
  and an extensive integration ecosystem. Atlassian discontinued HipChat Cloud, Stride, HipChat Server, and
  HipChat Data Center on February 15, 2019 after selling the IP to Slack in July 2018 and committing to a
  joint migration path for customers. This profile preserves the historical API surface (REST API v2, Webhooks,
  Connect add-on framework) for archival and migration-pattern research; no live endpoints remain.
