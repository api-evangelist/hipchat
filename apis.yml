apis:
- name: HipChat REST API v2
  description: The HipChat REST API v2 was the primary developer surface for the team chat platform, exposing
    rooms, users, messages, notifications, emoticons, OAuth sessions, add-on capabilities, and webhook
    management. Authentication supported four token types (add-on tokens, user tokens, personal access tokens,
    and room notification tokens) passed as either an auth_token query parameter or an Authorization Bearer
    header. The API was retired on February 15, 2019 alongside the rest of the HipChat product line.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
